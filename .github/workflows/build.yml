name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: bpbv-updater-windows
            exe_name: bpbv-updater.exe
          - os: macos-latest
            artifact: bpbv-updater-macos
            exe_name: bpbv-updater.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --name bpbv-updater -y app.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install pyinstaller
          pyinstaller --onedir --windowed --name bpbv-updater -y app.py

      - name: Zip macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r bpbv-updater-macos.zip bpbv-updater.app

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/bpbv-updater.exe

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/bpbv-updater-macos.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/bpbv-updater-windows/bpbv-updater.exe
            artifacts/bpbv-updater-macos/bpbv-updater-macos.zip
          generate_release_notes: true
